<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartSpin | Chat</title>
  <link rel="icon" type="image/png" href="../assets/logo_notext.png" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">
      <img class="brand-logo" src="../assets/smartspin_logo.png" alt="SmartSpin logo" />
      <span class="brand-word"><span class="brand-smart">Smart</span><span class="brand-spin">Spin</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="image.html">Image</a></li>
      <li><a href="chat.html" class="active" aria-current="page">Chat</a></li>
      <li><a href="accounts.html">Account</a></li>
    </ul>
  </nav>

  <main class="container" id="chatRoot"></main>

  <script>
    const chatRoot = document.getElementById("chatRoot");
    const API_BASE =
      window.location.port === "5500"
        ? "http://127.0.0.1:3000"
        : window.location.origin;

    function renderChat() {
      chatRoot.innerHTML = `
        <h1>Chat</h1>
        <section class="chat-shell">
          <div class="chat-window" id="chatWindow"></div>
          <form class="chat-input-row" id="chatForm">
            <input
              id="chatInput"
              type="text"
              placeholder="Type a message..."
              aria-label="Chat message"
            />
            <button type="submit" class="btn-primary">Send</button>
          </form>
        </section>
      `;

      const chatForm = document.getElementById("chatForm");
      const chatInput = document.getElementById("chatInput");
      const chatWindow = document.getElementById("chatWindow");

      function addMessage(text, role) {
        const bubble = document.createElement("p");
        bubble.className = `chat-bubble ${role}`;
        bubble.textContent = text;
        chatWindow.appendChild(bubble);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;
        addMessage(message, "user");
        chatInput.value = "";
      });
    }

    async function init() {
      try {
        const response = await fetch(`${API_BASE}/api/me`, {
          credentials: "include"
        });
        const payload = await response.json();
        if (payload.loggedIn) {
          renderChat();
          return;
        }
      } catch {}
      chatRoot.innerHTML = `<h1>sorry you need to log in</h1>`;
    }

    init();
  </script>
</body>
</html>
